<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Indicator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        .container{
            width:600px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        select,
        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        h2{
            text-align:center;
            margin-top:20px;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Student Exam Performance Indicator</h1>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<div class="form-group">
<label>Gender</label>
<select name="gender" required>
<option selected disabled value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="form-group">
<label>Race or Ethnicity</label>
<select name="ethnicity" required>
<option selected disabled value="">Select Group</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>
</div>

<div class="form-group">
<label>Parental Level of Education</label>
<select name="parental_level_of_education" required>
<option selected disabled value="">Select</option>
<option value="associate's degree">Associate's Degree</option>
<option value="bachelor's degree">Bachelor's Degree</option>
<option value="high school">High School</option>
<option value="master's degree">Master's Degree</option>
<option value="some college">Some College</option>
<option value="some high school">Some High School</option>
</select>
</div>

<div class="form-group">
<label>Lunch Type</label>
<select name="lunch" required>
<option selected disabled value="">Select</option>
<option value="standard">Standard</option>
<option value="free/reduced">Free/Reduced</option>
</select>
</div>

<div class="form-group">
<label>Test Preparation Course</label>
<select name="test_preparation_course" required>
<option selected disabled value="">Select</option>
<option value="completed">Completed</option>
<option value="none">None</option>
</select>
</div>

<div class="form-group">
<label>Reading Score</label>
<input type="number" name="reading_score" placeholder="Reading Score" required>
</div>

<div class="form-group">
<label>Writing Score</label>
<input type="number" name="writing_score" placeholder="Writing Score" required>
</div>

<button type="submit">Predict Maths Score</button>

</form>

{% if results %}
<h2>Predicted Maths Score: {{ results }}</h2>
{% endif %}

</div>

</body>
</html>
